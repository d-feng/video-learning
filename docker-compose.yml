version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - STORAGE_DIR=/app/storage
      - FRAME_INTERVAL=2.0
      - TRANSCRIPT_WINDOW_SEC=4.0
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
